name: Build JDC AX1800 Pro LiBwrt
run-name: ${{ inputs.variant || 'all' }} · JDC AX1800 Pro · LiBwrt main-nss

on:
  workflow_dispatch:
    inputs:
      variant:
        description: Firmware variant (all builds every variant; every successful selection updates the daily release)
        required: true
        default: all
        type: choice
        options:
          - all
          - core
          - core-daede
          - ultimate
      repo_commit:
        description: Lock upstream commit (leave empty for latest)
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.variant || 'all' }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x.git
  REPO_BRANCH: main-nss
  TZ: Asia/Shanghai

jobs:
  metadata:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      file_date: ${{ steps.release_date.outputs.file_date }}
      release_tag: ${{ steps.release_date.outputs.release_tag }}

    steps:
      - name: Generate release date
        id: release_date
        run: |
          FILE_DATE="$(date '+%Y.%m.%d')"
          echo "file_date=${FILE_DATE}" | tee -a "$GITHUB_OUTPUT"
          echo "release_tag=v${FILE_DATE}" | tee -a "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.variant }} firmware
    runs-on: ubuntu-latest
    needs: metadata
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJSON(inputs.variant == 'all' && '["core","core-daede","ultimate"]' || format('["{0}"]', inputs.variant)) }}
    env:
      FILE_DATE: ${{ needs.metadata.outputs.file_date }}

    steps:
      - name: Check server
        run: |
          echo "CPU: $(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2-)"
          echo "Cores: $(nproc)"
          free -h
          df -hT

      - name: Initialize environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo bash -c 'bash <(curl -fsSL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install clang llvm dos2unix libfuse-dev
          for tool in clang llc llvm-dis opt llvm-strip; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              candidate="$(ls /usr/bin/${tool}-* 2>/dev/null | sort -V | tail -n 1 || true)"
              if [ -n "$candidate" ]; then
                sudo ln -sf "$candidate" "/usr/local/bin/$tool"
              fi
            fi
            command -v "$tool"
          done
          clang --version | head -n 1
          llc --version | head -n 1
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq clean
          sudo timedatectl set-timezone "$TZ"

      - name: Maximize build space
        uses: easimon/maximize-build-space@fc881a613ad2a34aca9c9624518214ebc21dfc0c
        with:
          swap-size-mb: 1024
          root-reserve-mb: 8192
          temp-reserve-mb: 1024
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      - name: Checkout
        uses: actions/checkout@v6

      - name: Clone source
        id: clone_source
        run: |
          git clone --depth=1 -b "$REPO_BRANCH" "$REPO_URL" openwrt
          if [ -n "${{ inputs.repo_commit }}" ]; then
            cd openwrt
            git fetch --depth=1 origin "${{ inputs.repo_commit }}"
            git -c advice.detachedHead=false checkout FETCH_HEAD
            cd "$OLDPWD"
          fi
          cd openwrt
          echo "OPENWRT_PATH=$PWD" | tee -a "$GITHUB_ENV" "$GITHUB_OUTPUT"
          echo "SOURCE_COMMIT=$(git rev-parse --short HEAD)" | tee -a "$GITHUB_ENV" "$GITHUB_OUTPUT"
          {
            echo "VERSION_INFO<<EOF"
            git show -s --date=short --format='Author: %an%nDate: %cd%nSubject: %s%nHash: %H'
            echo "EOF"
          } | tee -a "$GITHUB_ENV" "$GITHUB_OUTPUT"

      - name: Generate version
        id: version
        run: |
          chmod +x scripts/version.sh
          bash scripts/version.sh

      - name: Load config and detect target
        id: detect_target
        run: |
          case "${{ matrix.variant }}" in
            core)
              cp configs/core.config openwrt/.config
              ;;
            core-daede)
              cat configs/core.config configs/core-daede.config > openwrt/.config
              ;;
            ultimate)
              cat configs/core.config configs/ultimate.config > openwrt/.config
              ;;
          esac
          cd openwrt
          unset VERSION
          make defconfig
          grep -q '^CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_jdcloud_re-ss-01=y$' .config \
            && echo "Target device verified: jdcloud_re-ss-01"
          source_repo="${REPO_URL##*/}"
          {
            echo "SOURCE_REPO=${source_repo%.git}"
            echo "DEVICE_TARGET=$(awk -F'"' '/CONFIG_TARGET_BOARD/{print $2}' .config)"
            echo "DEVICE_SUBTARGET=$(awk -F'"' '/CONFIG_TARGET_SUBTARGET/{print $2}' .config)"
            kernel_version="$(grep -E '^KERNEL_PATCHVER:=' target/linux/qualcommax/Makefile 2>/dev/null | sed 's/.*:=//;s/^[[:space:]]*//')"
            echo "VERSION_KERNEL=${kernel_version:-6.12}"
          } | tee -a "$GITHUB_ENV" "$GITHUB_OUTPUT"

      - name: Cache dl
        uses: actions/cache@v5
        with:
          path: ${{ steps.clone_source.outputs.OPENWRT_PATH }}/dl
          key: openwrt-dl-jdc-ax1800-pro-libwrt-${{ steps.detect_target.outputs.DEVICE_TARGET }}-${{ steps.detect_target.outputs.DEVICE_SUBTARGET }}

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ steps.clone_source.outputs.OPENWRT_PATH }}/.ccache
          key: openwrt-ccache-${{ matrix.variant }}-${{ steps.detect_target.outputs.DEVICE_TARGET }}-${{ steps.detect_target.outputs.DEVICE_SUBTARGET }}-${{ steps.clone_source.outputs.SOURCE_COMMIT }}-${{ hashFiles('configs/*.config', 'scripts/diy.sh', 'scripts/version.sh', 'files/**', 'files-homeproxy/**', 'files-daede/**', 'files-ultimate/**') }}
          restore-keys: |
            openwrt-ccache-${{ matrix.variant }}-${{ steps.detect_target.outputs.DEVICE_TARGET }}-${{ steps.detect_target.outputs.DEVICE_SUBTARGET }}-${{ steps.clone_source.outputs.SOURCE_COMMIT }}-
            openwrt-ccache-${{ matrix.variant }}-${{ steps.detect_target.outputs.DEVICE_TARGET }}-${{ steps.detect_target.outputs.DEVICE_SUBTARGET }}-

      - name: Install feeds
        run: |
          cd "$OPENWRT_PATH"
          chmod +x $GITHUB_WORKSPACE/scripts/update-feeds.sh
          $GITHUB_WORKSPACE/scripts/update-feeds.sh

      - name: Apply custom files and scripts
        run: |
          mkdir -p "$OPENWRT_PATH/files"
          [ -d files ] && cp -a files/. "$OPENWRT_PATH/files/"
          case "${{ matrix.variant }}" in
            core)
              [ -d files-homeproxy ] && cp -a files-homeproxy/. "$OPENWRT_PATH/files/"
              ;;
            core-daede)
              [ -d files-daede ] && cp -a files-daede/. "$OPENWRT_PATH/files/"
              ;;
            ultimate)
              [ -d files-homeproxy ] && cp -a files-homeproxy/. "$OPENWRT_PATH/files/"
              [ -d files-ultimate ] && cp -a files-ultimate/. "$OPENWRT_PATH/files/"
              ;;
          esac
          dos2unix scripts/diy.sh
          chmod +x scripts/diy.sh
          cd "$OPENWRT_PATH"
          "$GITHUB_WORKSPACE/scripts/diy.sh" "${{ matrix.variant }}"
          case "${{ matrix.variant }}" in
            core)
              cp "$GITHUB_WORKSPACE/configs/core.config" .config
              ;;
            core-daede)
              cat "$GITHUB_WORKSPACE/configs/core.config" "$GITHUB_WORKSPACE/configs/core-daede.config" > .config
              ;;
            ultimate)
              cat "$GITHUB_WORKSPACE/configs/core.config" "$GITHUB_WORKSPACE/configs/ultimate.config" > .config
              ;;
          esac

      - name: Download packages
        run: |
          cd "$OPENWRT_PATH"
          unset VERSION
          make defconfig
          require_config() {
            symbol="$1"
            if grep -q "^${symbol}=y$" .config; then
              echo "OK: ${symbol}=y"
              return 0
            fi
            echo "::error::Missing required config: ${symbol}=y" >&2
            grep -E "^(# )?${symbol}(=| is not set)" .config >&2 || true
            exit 1
          }
          forbid_config() {
            symbol="$1"
            if grep -Eq "^${symbol}=(y|m)$" .config; then
              echo "::error::Forbidden config is enabled: ${symbol}" >&2
              grep -E "^(# )?${symbol}(=| is not set)" .config >&2 || true
              exit 1
            fi
            echo "OK: ${symbol} is not enabled"
          }
          require_recipe_patch() {
            image_mk="target/linux/qualcommax/image/ipq60xx.mk"
            awk '
              /^define Device\/jdcloud_re-ss-01$/ { in_device = 1 }
              in_device && /KERNEL_SIZE := 12288k/ { kernel_ok = 1 }
              in_device && /SUPPORTED_DEVICES \+= jdcloud,ax1800-pro/ { compat_ok = 1 }
              /^endef$/ && in_device { in_device = 0 }
              END { exit !(kernel_ok && compat_ok) }
            ' "$image_mk" || {
              echo "::error::JDCloud AX1800 Pro image recipe patch is missing or incomplete" >&2
              sed -n '/define Device\/jdcloud_re-ss-01/,/endef/p' "$image_mk" >&2
              exit 1
            }
            echo "OK: JDCloud image recipe patched for 12MiB HLOS and ax1800-pro compat"
          }
          require_config CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_jdcloud_re-ss-01
          require_config CONFIG_TARGET_ROOTFS_SQUASHFS
          require_config CONFIG_IPQ_MEM_PROFILE_512
          require_config CONFIG_NSS_MEM_PROFILE_MEDIUM
          require_config CONFIG_NSS_FIRMWARE_VERSION_12_2
          require_config CONFIG_PACKAGE_nss-firmware-ipq60xx
          require_config CONFIG_NSS_DRV_IGS_ENABLE
          require_config CONFIG_NSS_DRV_IPV6_ENABLE
          require_config CONFIG_NSS_DRV_L2TP_ENABLE
          require_config CONFIG_NSS_DRV_LAG_ENABLE
          require_config CONFIG_NSS_DRV_MAPT_ENABLE
          require_config CONFIG_NSS_DRV_PPPOE_ENABLE
          require_config CONFIG_NSS_DRV_PPTP_ENABLE
          require_config CONFIG_NSS_DRV_SHAPER_ENABLE
          require_config CONFIG_NSS_DRV_VIRT_IF_ENABLE
          require_config CONFIG_PACKAGE_cpufreq
          require_config CONFIG_PACKAGE_kmod-qca-nss-drv
          require_config CONFIG_PACKAGE_kmod-qca-nss-ecm
          require_config CONFIG_PACKAGE_kmod-qca-nss-drv-igs
          require_config CONFIG_PACKAGE_kmod-qca-nss-drv-l2tpv2
          require_config CONFIG_PACKAGE_kmod-qca-nss-drv-lag-mgr
          require_config CONFIG_PACKAGE_kmod-qca-nss-drv-map-t
          require_config CONFIG_PACKAGE_kmod-qca-nss-drv-pppoe
          require_config CONFIG_PACKAGE_kmod-qca-nss-drv-pptp
          require_config CONFIG_PACKAGE_kmod-qca-nss-drv-qdisc
          require_config CONFIG_PACKAGE_kmod-qca-mcs
          require_config CONFIG_PACKAGE_ip-full
          require_config CONFIG_PACKAGE_luci-app-samba4
          require_config CONFIG_PACKAGE_samba4-server
          require_config CONFIG_PACKAGE_luci-app-zerotier
          require_config CONFIG_PACKAGE_uhttpd
          require_config CONFIG_PACKAGE_rpcd
          require_config CONFIG_PACKAGE_luci-app-diskman
          require_config CONFIG_PACKAGE_block-mount
          require_config CONFIG_PACKAGE_blockd
          require_config CONFIG_PACKAGE_automount
          test ! -e package/luci-app-quickfile-go
          test ! -e package/quickfile-go
          forbid_config CONFIG_PACKAGE_luci-app-quickfile
          forbid_config CONFIG_PACKAGE_luci-app-quickfile-go
          forbid_config CONFIG_PACKAGE_quickfile
          forbid_config CONFIG_PACKAGE_quickfile-go
          forbid_config CONFIG_PACKAGE_luci-nginx
          forbid_config CONFIG_PACKAGE_luci-app-filemanager
          forbid_config CONFIG_PACKAGE_luci-app-statistics
          forbid_config CONFIG_PACKAGE_collectd
          forbid_config CONFIG_PACKAGE_collectd-mod-cpu
          forbid_config CONFIG_PACKAGE_collectd-mod-interface
          forbid_config CONFIG_PACKAGE_collectd-mod-memory
          forbid_config CONFIG_PACKAGE_collectd-mod-conntrack
          forbid_config CONFIG_PACKAGE_kmod-ath11k
          forbid_config CONFIG_PACKAGE_kmod-ath11k-ahb
          forbid_config CONFIG_PACKAGE_kmod-ath11k-pci
          forbid_config CONFIG_PACKAGE_ath11k-firmware-ipq6018
          forbid_config CONFIG_PACKAGE_kmod-cfg80211
          forbid_config CONFIG_PACKAGE_kmod-mac80211
          forbid_config CONFIG_PACKAGE_wpad-openssl
          require_recipe_patch
          case "${{ matrix.variant }}" in
            core)
              test -f feeds/luci/applications/luci-app-homeproxy/Makefile || {
                echo "::error::HomeProxy source was not injected at feeds/luci/applications/luci-app-homeproxy" >&2
                exit 1
              }
              test -L package/feeds/luci/luci-app-homeproxy || {
                echo "::error::HomeProxy feed package symlink is missing" >&2
                exit 1
              }
              grep -q '^LUCI_TITLE:=The modern ImmortalWrt proxy platform' feeds/luci/applications/luci-app-homeproxy/Makefile || {
                echo "::error::Unexpected HomeProxy Makefile after injection" >&2
                exit 1
              }
              grep -q '+sing-box' feeds/luci/applications/luci-app-homeproxy/Makefile || {
                echo "::error::HomeProxy no longer depends on sing-box" >&2
                exit 1
              }
              test -n "${HOMEPROXY_COMMIT:-}" || {
                echo "::error::HomeProxy commit was not exported" >&2
                exit 1
              }
              test -n "${SING_BOX_VERSION:-}" || {
                echo "::error::sing-box latest stable version was not exported" >&2
                exit 1
              }
              grep -q "^PKG_VERSION:=${SING_BOX_VERSION}$" feeds/packages/net/sing-box/Makefile || {
                echo "::error::sing-box Makefile does not match latest stable ${SING_BOX_VERSION}" >&2
                exit 1
              }
              grep -q "^PKG_HASH:=${SING_BOX_SOURCE_SHA256}$" feeds/packages/net/sing-box/Makefile || {
                echo "::error::sing-box Makefile hash does not match downloaded stable source" >&2
                exit 1
              }
              test -f "dl/${SING_BOX_SOURCE_FILE}" || {
                echo "::error::cached sing-box source tarball is missing" >&2
                exit 1
              }
              echo "${SING_BOX_SOURCE_SHA256}  dl/${SING_BOX_SOURCE_FILE}" | sha256sum -c -
              require_config CONFIG_PACKAGE_luci-app-homeproxy
              require_config CONFIG_PACKAGE_sing-box
              require_config CONFIG_PACKAGE_kmod-nft-socket
              require_config CONFIG_PACKAGE_kmod-nft-tproxy
              forbid_config CONFIG_PACKAGE_dockerd
              ;;
            core-daede)
              test -f package/dae/Makefile
              test -f package/daed/Makefile
              test -f package/luci-app-daede/Makefile
              test ! -e package/feeds/packages/dae
              test ! -e package/feeds/packages/daed
              test ! -e package/feeds/luci/luci-app-dae
              test ! -e package/feeds/luci/luci-app-daed
              test ! -e package/feeds/luci/luci-app-daede
              echo "daede package source: kenzok8/openwrt-daede"
              grep -q '^PKG_NAME:=dae$' package/dae/Makefile
              grep -q '^PKG_VERSION:=2026.06.14$' package/dae/Makefile
              grep -q '^PKG_HASH:=5bbbd017bffdf04d0357a4e487c5d108b983c29b231fa752de17ddda00b2b462$' package/dae/Makefile
              grep -q '^PKG_NAME:=daed$' package/daed/Makefile
              grep -q '^PKG_VERSION:=2026.06.14$' package/daed/Makefile
              grep -q '^PKG_HASH:=eeba8db775d248ce06f34adda7a392548c78a1d9d11d9a162e0ab41d5cc216d6$' package/daed/Makefile
              grep -q '^PKG_NAME:=luci-app-daede$' package/luci-app-daede/Makefile
              grep -q '^PKG_VERSION:=1.14.7$' package/luci-app-daede/Makefile
              grep -Fq 'default PACKAGE_$(PKG_NAME)_daed' package/luci-app-daede/Makefile
              grep -Fq '+PACKAGE_$(PKG_NAME)_dae:dae +PACKAGE_$(PKG_NAME)_daed:daed' package/luci-app-daede/Makefile
              grep -q 'uclient-fetch' package/luci-app-daede/root/www/cgi-bin/daede-graphql
              grep -q 'DAEDE_FETCH_BIN:-uclient-fetch' package/luci-app-daede/root/usr/share/luci-app-daede/fetch-clash-yaml.sh
              grep -q 'ucode -e' package/luci-app-daede/root/usr/share/luci-app-daede/config-backup.sh
              grep -q 'curl -fsSL' package/luci-app-daede/root/usr/share/luci-app-daede/update-geo.sh
              grep -q 'command -v curl' package/luci-app-daede/root/usr/share/luci-app-daede/proxy-check.sh
              grep -Fq "localStorage.getItem('aurora.theme')" package/luci-theme-aurora/ucode/template/themes/aurora/header.ut
              grep -Fq "document.documentElement.setAttribute('data-darkmode'" package/luci-theme-aurora/ucode/template/themes/aurora/header.ut
              ! grep -Fq "document.documentElement.setAttribute('data-darkmode', 'true')" package/luci-app-daede/htdocs/luci-static/resources/view/daede/config.js
              ! grep -Fq '0.299 * m[0]' package/luci-app-daede/htdocs/luci-static/resources/view/daede/config.js
              grep -Fq "document.documentElement.getAttribute('data-darkmode') === 'true'" package/luci-app-daede/htdocs/luci-static/resources/view/daede/config.js
              grep -Fq "document.documentElement.setAttribute('data-daede-darkmode', 'true')" package/luci-app-daede/htdocs/luci-static/resources/view/daede/config.js
              grep -Fq 'html[data-daede-darkmode="true"] .dd-card' package/luci-app-daede/htdocs/luci-static/resources/view/daede/styles.js
              grep -Fq 'border-radius:8px' package/luci-app-daede/htdocs/luci-static/resources/view/daede/styles.js
              grep -Fq 'background:var(--brand,#46a3d1)' package/luci-app-daede/htdocs/luci-static/resources/view/daede/styles.js
              ! grep -Fq 'linear-gradient(#3886a1,#2f7288)' package/luci-app-daede/htdocs/luci-static/resources/view/daede/styles.js
              grep -Fq 'No prefers-color-scheme dark block' package/luci-app-daede/htdocs/luci-static/resources/view/daede/styles.js
              awk '/^config BUSYBOX_DEFAULT_FLOCK$/ { found = 1; next } found && /^[[:space:]]*default y$/ { ok = 1 } found && /^config / { found = 0 } END { exit !ok }' package/utils/busybox/Config-defaults.in
              grep -Fq '+@KERNEL_XDP_SOCKETS' package/dae/Makefile
              grep -Fq '+@KERNEL_XDP_SOCKETS' package/daed/Makefile
              require_config CONFIG_PACKAGE_dae
              require_config CONFIG_DAE_USE_KERNEL_BTF
              require_config CONFIG_PACKAGE_daed
              require_config CONFIG_DAED_USE_KERNEL_BTF
              require_config CONFIG_PACKAGE_luci-app-daede
              require_config CONFIG_PACKAGE_luci-app-daede_daed
              require_config CONFIG_PACKAGE_curl
              require_config CONFIG_PACKAGE_uclient-fetch
              require_config CONFIG_PACKAGE_ucode
              require_config CONFIG_BPF_TOOLCHAIN_HOST
              require_config CONFIG_KERNEL_CGROUP_BPF
              require_config CONFIG_KERNEL_BPF_EVENTS
              require_config CONFIG_KERNEL_DEBUG_INFO_BTF
              require_config CONFIG_KERNEL_XDP_SOCKETS
              require_config CONFIG_PACKAGE_ca-bundle
              require_config CONFIG_PACKAGE_kmod-sched-core
              require_config CONFIG_PACKAGE_kmod-sched-bpf
              require_config CONFIG_PACKAGE_kmod-veth
              require_config CONFIG_PACKAGE_kmod-xdp-sockets-diag
              require_config CONFIG_PACKAGE_v2ray-geoip
              require_config CONFIG_PACKAGE_v2ray-geosite
              forbid_config CONFIG_DAED_USE_VMLINUX_BTF
              forbid_config CONFIG_PACKAGE_luci-app-dae
              forbid_config CONFIG_PACKAGE_luci-app-daed
              forbid_config CONFIG_PACKAGE_dae-geoip
              forbid_config CONFIG_PACKAGE_dae-geosite
              forbid_config CONFIG_PACKAGE_daed-geoip
              forbid_config CONFIG_PACKAGE_daed-geosite
              forbid_config CONFIG_PACKAGE_luci-app-homeproxy
              forbid_config CONFIG_PACKAGE_sing-box
              forbid_config CONFIG_PACKAGE_dockerd
              ;;
            ultimate)
              test -f feeds/luci/applications/luci-app-homeproxy/Makefile || {
                echo "::error::HomeProxy source was not injected at feeds/luci/applications/luci-app-homeproxy" >&2
                exit 1
              }
              test -L package/feeds/luci/luci-app-homeproxy || {
                echo "::error::HomeProxy feed package symlink is missing" >&2
                exit 1
              }
              grep -q '^LUCI_TITLE:=The modern ImmortalWrt proxy platform' feeds/luci/applications/luci-app-homeproxy/Makefile || {
                echo "::error::Unexpected HomeProxy Makefile after injection" >&2
                exit 1
              }
              grep -q '+sing-box' feeds/luci/applications/luci-app-homeproxy/Makefile || {
                echo "::error::HomeProxy no longer depends on sing-box" >&2
                exit 1
              }
              test -n "${HOMEPROXY_COMMIT:-}" || {
                echo "::error::HomeProxy commit was not exported" >&2
                exit 1
              }
              test -n "${SING_BOX_VERSION:-}" || {
                echo "::error::sing-box latest stable version was not exported" >&2
                exit 1
              }
              grep -q "^PKG_VERSION:=${SING_BOX_VERSION}$" feeds/packages/net/sing-box/Makefile || {
                echo "::error::sing-box Makefile does not match latest stable ${SING_BOX_VERSION}" >&2
                exit 1
              }
              grep -q "^PKG_HASH:=${SING_BOX_SOURCE_SHA256}$" feeds/packages/net/sing-box/Makefile || {
                echo "::error::sing-box Makefile hash does not match downloaded stable source" >&2
                exit 1
              }
              test -f "dl/${SING_BOX_SOURCE_FILE}" || {
                echo "::error::cached sing-box source tarball is missing" >&2
                exit 1
              }
              echo "${SING_BOX_SOURCE_SHA256}  dl/${SING_BOX_SOURCE_FILE}" | sha256sum -c -
              require_config CONFIG_PACKAGE_luci-app-homeproxy
              require_config CONFIG_PACKAGE_sing-box
              require_config CONFIG_PACKAGE_kmod-nft-socket
              require_config CONFIG_PACKAGE_luci-app-aria2
              require_config CONFIG_PACKAGE_aria2
              require_config CONFIG_PACKAGE_kmod-fs-ntfs3
              require_config CONFIG_PACKAGE_kmod-usb-storage-uas
              forbid_config CONFIG_PACKAGE_dockerd
              forbid_config CONFIG_PACKAGE_docker
              forbid_config CONFIG_PACKAGE_docker-compose
              forbid_config CONFIG_PACKAGE_containerd
              forbid_config CONFIG_PACKAGE_runc
              forbid_config CONFIG_PACKAGE_luci-app-dockerman
              forbid_config CONFIG_PACKAGE_luci-lib-docker
              forbid_config CONFIG_PACKAGE_cgroupfs-mount
              forbid_config CONFIG_PACKAGE_tini
              ;;
          esac
          make download -j"$(nproc)"
          find dl -maxdepth 1 -type f -size -1024c -print -delete

      - name: Check build space before compile
        run: |
          df -hT
          du -sh "$OPENWRT_PATH" "$OPENWRT_PATH/dl" "$OPENWRT_PATH/.ccache" 2>/dev/null || true

      - name: Compile firmware
        id: compile
        run: |
          cd "$OPENWRT_PATH"
          unset VERSION
          ccache -M 2G || true
          ccache -z || true
          if make -j"$(nproc)"; then
            echo "Parallel build succeeded"
          elif make -j1 V=s; then
            echo "Single-threaded retry succeeded"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          ccache -s || true
          echo "status=success" >> "$GITHUB_OUTPUT"
          echo "FILE_DATE=${FILE_DATE}" | tee -a "$GITHUB_ENV" "$GITHUB_OUTPUT"
          echo "DATE=$(date '+%Y-%m-%d %H:%M:%S')" | tee -a "$GITHUB_ENV" "$GITHUB_OUTPUT"

      - name: Organize firmware
        id: organize
        if: steps.compile.outputs.status == 'success'
        run: |
          cd "$OPENWRT_PATH/bin/targets"/*/*
          ls -lh
          test -f ./*jdcloud_re-ss-01*squashfs-factory*
          test -f ./*jdcloud_re-ss-01*squashfs-sysupgrade*
          cat sha256sums
          VARIANT="${{ matrix.variant }}"
          for f in *jdcloud_re-ss-01*squashfs-factory*; do
            [ -f "$f" ] && mv "$f" "JDC-AX1800-Pro-LiBwrt-${FILE_DATE}-${VARIANT}-factory.bin"
          done
          for f in *jdcloud_re-ss-01*squashfs-sysupgrade*; do
            [ -f "$f" ] && mv "$f" "JDC-AX1800-Pro-LiBwrt-${FILE_DATE}-${VARIANT}-sysupgrade.bin"
          done
          sha256sum JDC-AX1800-Pro-LiBwrt-${FILE_DATE}-${VARIANT}-*.bin > "sha256sums-${VARIANT}"
          {
            echo "Builder repository: ${GITHUB_REPOSITORY}"
            echo "Builder commit: ${GITHUB_SHA}"
            echo "Workflow: ${GITHUB_WORKFLOW}"
            echo "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "Build date: ${DATE}"
            echo "Build version: ${FIRMWARE_VERSION}"
            echo "Source repository: ${REPO_URL}"
            echo "Source branch: ${REPO_BRANCH}"
            echo "Source commit: ${SOURCE_COMMIT}"
            echo "Kernel: ${VERSION_KERNEL}"
            echo "Variant: ${VARIANT}"
            echo "Final .config SHA256: $(sha256sum "${OPENWRT_PATH}/.config" | awk '{print $1}')"
            echo "core.config SHA256: $(sha256sum "${GITHUB_WORKSPACE}/configs/core.config" | awk '{print $1}')"
            if [ "${VARIANT}" = "core-daede" ]; then
              echo "core-daede.config SHA256: $(sha256sum "${GITHUB_WORKSPACE}/configs/core-daede.config" | awk '{print $1}')"
            fi
            if [ "${VARIANT}" = "ultimate" ]; then
              echo "ultimate.config SHA256: $(sha256sum "${GITHUB_WORKSPACE}/configs/ultimate.config" | awk '{print $1}')"
            fi
            echo "DIY script SHA256: $(sha256sum "${GITHUB_WORKSPACE}/scripts/diy.sh" | awk '{print $1}')"
            echo "Aurora commit: ${AURORA_COMMIT:-unknown}"
            echo "HomeProxy commit: ${HOMEPROXY_COMMIT:-not-included}"
            echo "HomeProxy branch: ${HOMEPROXY_BRANCH:-not-included}"
            echo "sing-box feed version: ${SING_BOX_FEED_VERSION:-not-included}"
            echo "sing-box selected stable: ${SING_BOX_TAG:-not-included}"
            echo "sing-box source file: ${SING_BOX_SOURCE_FILE:-not-included}"
            echo "sing-box source SHA256: ${SING_BOX_SOURCE_SHA256:-not-included}"
            echo "sing-box required Go: ${SING_BOX_GO_VERSION:-not-included}"
            echo "OpenWrt feed Go: ${OPENWRT_GO_VERSION:-not-included}"
            if [ "${VARIANT}" = "core-daede" ]; then
              echo "DAEDE package source: kenzok8/openwrt-daede @ ${DAEDE_COMMIT:-unknown}"
            else
              echo "DAEDE package source: not-included"
            fi
            echo
            echo "Firmware SHA256:"
            cat "sha256sums-${VARIANT}"
          } > "BUILD-MANIFEST-${VARIANT}.txt"
          build_info_files=("BUILD-MANIFEST-${VARIANT}.txt")
          for f in config.buildinfo feeds.buildinfo version.buildinfo profiles.json *.manifest; do
            [ -e "$f" ] && build_info_files+=("$f")
          done
          tar -czf "build-info-${FILE_DATE}-${VARIANT}.tar.gz" "${build_info_files[@]}"
          echo "FIRMWARE_PATH=$PWD" | tee -a "$GITHUB_ENV" "$GITHUB_OUTPUT"

      - name: Upload firmware artifact
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ matrix.variant }}
          path: |
            ${{ steps.organize.outputs.FIRMWARE_PATH }}/*.bin
            ${{ steps.organize.outputs.FIRMWARE_PATH }}/sha256sums-${{ matrix.variant }}
            ${{ steps.organize.outputs.FIRMWARE_PATH }}/BUILD-MANIFEST-${{ matrix.variant }}.txt
            ${{ steps.organize.outputs.FIRMWARE_PATH }}/build-info-${{ needs.metadata.outputs.file_date }}-${{ matrix.variant }}.tar.gz

  release:
    name: Publish firmware release
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build
    if: needs.build.result == 'success'
    permissions:
      contents: write
    env:
      FILE_DATE: ${{ needs.metadata.outputs.file_date }}
      RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
      REQUESTED_VARIANT: ${{ inputs.variant }}

    steps:
      - name: Download firmware artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: firmware-*
          path: firmware
          merge-multiple: true

      - name: Prepare release body
        run: |
          cd firmware
          cat sha256sums-* > sha256sums

          release_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          kernel="$(awk -F': ' '/^Kernel:/{print $2; exit}' BUILD-MANIFEST-*.txt)"
          source_commit="$(awk -F': ' '/^Source commit:/{print $2; exit}' BUILD-MANIFEST-*.txt)"
          build_version="$(awk -F': ' '/^Build version:/{print $2; exit}' BUILD-MANIFEST-*.txt)"

          link_or_dash() {
            file="$1"
            if [ -f "$file" ]; then
              printf '[%s](%s/%s)' "$2" "$release_url" "$file"
            else
              printf '%s' '-'
            fi
          }

          {
            echo "## 下载"
            echo
            echo "| 变体 | 适用场景 | sysupgrade | factory |"
            echo "|:---|:---|:---|:---|"
            for variant in core core-daede ultimate; do
              case "$variant" in
                core) desc="日用主路由" ;;
                core-daede) desc="dae/daed eBPF 实验版" ;;
                ultimate) desc="存储下载增强版" ;;
              esac
              sysupgrade="JDC-AX1800-Pro-LiBwrt-${FILE_DATE}-${variant}-sysupgrade.bin"
              factory="JDC-AX1800-Pro-LiBwrt-${FILE_DATE}-${variant}-factory.bin"
              if [ -f "$sysupgrade" ] || [ -f "$factory" ]; then
                printf '| `%s` | %s | %s | %s |\n' \
                  "$variant" \
                  "$desc" \
                  "$(link_or_dash "$sysupgrade" sysupgrade)" \
                  "$(link_or_dash "$factory" factory)"
              fi
            done
            echo
            echo "> 日常升级请使用 sysupgrade；factory 镜像不要通过 pepe2k U-Boot Web UI 刷入。"
            echo
            echo "## 构建信息"
            echo
            echo "- 日期: ${FILE_DATE}"
            echo "- 内核: ${kernel:-unknown}"
            echo "- 固件版本: ${build_version:-unknown}"
            echo "- 上游: LiBwrt main-nss @ ${source_commit:-unknown}"
            echo "- 触发选择: ${REQUESTED_VARIANT:-unknown}"
            echo "- 构建记录: ${run_url}"
            echo
            echo "单变体构建也会更新本 Release；同名固件资产会被最新构建自动覆盖。"
            echo
            echo "校验和见 \`sha256sums\`，完整追溯信息见 \`BUILD-MANIFEST-*.txt\` 和 \`build-info-*.tar.gz\`。"
          } > RELEASE.md

      - name: Publish release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd
        with:
          name: JDC AX1800 Pro LiBwrt · ${{ needs.metadata.outputs.file_date }}
          tag: ${{ needs.metadata.outputs.release_tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: firmware/*.bin,firmware/sha256sums,firmware/BUILD-MANIFEST-*.txt,firmware/build-info-*.tar.gz
          bodyFile: firmware/RELEASE.md
          commit: ${{ github.sha }}
          artifactErrorsFailBuild: true
          allowUpdates: true
          replacesArtifacts: true
